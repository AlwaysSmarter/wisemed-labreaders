<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WiseMED - LabReaders</title>
    <link rel="stylesheet" href="/web/css/main.css"  type="text/css" />
    <!-- script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script -->
    <script src="/web/jquery-3.5.1.min.js" rossorigin="anonymous"></script>
</head>
<body>
<div class="title">
    <h1>WiseMED - LabReaders</h1>
    <img src="/web/imgs/WiseMED.png" width="300">
</div>
<form id="login-form" action="/login" method="POST" class="title">
    <div>
        <div>Login name</div>
        <div>
            <input type="text" name="APP_login" value="{APP_login}">
        </div>
    </div>
    <div>
        <div>Password</div>
        <div>
            <input type="password" name="APP_pass" value="{APP_pass}">
        </div>
    </div>
    <div>
        <br>
        <input type="button" name="Login" value="Login">
    </div>
    <div class="config hide">
        <h3>WiseMED API configuration</h3>
    <div class="config hide">
        <div class="label">WiseMED API Port</div>
        <div>
            <input type="text" name="APP_wm_port" value="">
        </div>
    </div>
    </div>
</form>
<script>
    $( document ).ready(function() {
        $('input[value=""]').parents('.config').removeClass('hide');
        $('input[type="button"]').click(function(){
            if ($('input[value=""]').length > 0) {
                $('input[value=""]').parents('.config').find('.label').addClass('error');
                alert('First fill in all data (including configuration one)');
                return;
            }
            $('#login-form').submit();
        });
    });
</script>
</body>
</html>
