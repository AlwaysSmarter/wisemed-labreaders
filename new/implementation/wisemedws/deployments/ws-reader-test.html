<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WiseMEDWS Reader Test</title>
  <style>
    body { font-family: sans-serif; margin: 20px; max-width: 1000px; }
    .row { display: flex; gap: 12px; margin-bottom: 10px; }
    .row > div { flex: 1; }
    input, button, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
    textarea { height: 160px; font-family: monospace; }
    #log { height: 320px; }
  </style>
</head>
<body>
  <h2>WiseMEDWS Reader WS Test</h2>

  <div class="row">
    <div>
      <label>WS URL</label>
      <input id="wsUrl" value="ws://127.0.0.1:8090/ws/readers" />
    </div>
    <div>
      <label>Reader API Key (JWT secret)</label>
      <input id="apiKey" value="reader-key-demo-001" />
    </div>
  </div>

  <div class="row">
    <div>
      <label>Reader ID</label>
      <input id="readerId" value="reader-maglumi-001" />
    </div>
    <div>
      <label>Analyzer Code</label>
      <input id="analyzerCode" value="maglumi-800" />
    </div>
    <div>
      <label>Analyzer Name</label>
      <input id="analyzerName" value="Maglumi 800" />
    </div>
    <div>
      <label>Analyzer Type</label>
      <input id="analyzerType" value="immunology" />
    </div>
  </div>

  <div class="row">
    <div><button id="connectBtn">Connect</button></div>
    <div><button id="disconnectBtn">Disconnect</button></div>
    <div><button id="sendHelloBtn">Send Hello</button></div>
    <div><button id="sendHeartbeatBtn">Send Heartbeat</button></div>
  </div>

  <div class="row">
    <div>
      <label>Manual JSON Message</label>
      <textarea id="manualMsg">{
  "type": "heartbeat",
  "reader_id": "reader-maglumi-001",
  "status": "online",
  "meta": {"source": "html-test"},
  "created_at": "2026-01-01T00:00:00Z"
}</textarea>
    </div>
  </div>

  <div class="row">
    <div><button id="sendManualBtn">Send Manual JSON</button></div>
  </div>

  <h3>Admin Ping API Test</h3>
  <div class="row">
    <div>
      <label>Admin API Base URL</label>
      <input id="apiBaseUrl" value="http://127.0.0.1:8090" />
    </div>
    <div>
      <label>Admin JWT (role=admin)</label>
      <input id="adminJwt" value="" />
    </div>
    <div>
      <label>Timeout ms</label>
      <input id="pingTimeout" type="number" value="3000" />
    </div>
  </div>

  <div class="row">
    <div><button id="pingOneBtn">Ping This Reader</button></div>
    <div><button id="pingAllBtn">Ping All Readers</button></div>
  </div>
  <div class="row">
    <div><button id="statusBtn">Get Reader Status</button></div>
    <div><button id="logsBtn">Get Reader Logs</button></div>
  </div>
  <div class="row">
    <div>
      <label>Worklist Sample ID</label>
      <input id="sampleId" value="SAMPLE-001" />
    </div>
    <div>
      <label>Requested Tags (comma separated)</label>
      <input id="requestedTags" value="TSH,FT4,CRP" />
    </div>
    <div><button id="resolveWorklistBtn">Resolve Worklist</button></div>
  </div>

  <label>Log</label>
  <textarea id="log" readonly></textarea>

  <script>
    let ws = null;
    let hbTimer = null;

    const E = id => document.getElementById(id);
    const log = msg => {
      const out = E('log');
      out.value += `[${new Date().toISOString()}] ${msg}\n`;
      out.scrollTop = out.scrollHeight;
    };

    function nowISO() { return new Date().toISOString(); }

    function helloPayload() {
      return {
        type: 'reader_hello',
        reader_id: E('readerId').value,
        analyzer_code: E('analyzerCode').value,
        analyzer_name: E('analyzerName').value,
        analyzer_type: E('analyzerType').value,
        license_code: 'TEST-LICENSE',
        created_at: nowISO()
      };
    }

    function heartbeatPayload() {
      return {
        type: 'heartbeat',
        reader_id: E('readerId').value,
        status: 'online',
        meta: { source: 'html-test' },
        created_at: nowISO()
      };
    }

    function send(obj) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('WS not connected');
        return;
      }
      const raw = JSON.stringify(obj);
      ws.send(raw);
      log('TX ' + raw);
    }

    E('connectBtn').onclick = async () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        log('Already connected');
        return;
      }
      const base = E('wsUrl').value.trim();
      const apiKey = E('apiKey').value.trim();
      const token = await buildReaderJWT(apiKey);
      const url = `${base}?token=${encodeURIComponent(token)}`;
      ws = new WebSocket(url);

      ws.onopen = () => {
        log('Connected');
        send(helloPayload());
        hbTimer = setInterval(() => send(heartbeatPayload()), 10000);
      };

      ws.onmessage = ev => {
        log('RX ' + ev.data);
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'command') {
            const resp = {
              type: 'command_result',
              command_id: msg.command_id,
              correlation_id: msg.correlation_id,
              success: true,
              data: { handled_by: 'ws-reader-test.html', command: msg.command },
              handled_at: nowISO()
            };
            send(resp);
          } else if (msg.type === 'registration_state') {
            log(`REGISTRATION registered=${msg.registered} setup_complete=${msg.setup_complete} profile=${JSON.stringify(msg.profile || {})}`);
          } else if (msg.type === 'pongall') {
            log(`PONGALL results=${JSON.stringify(msg.results || [])}`);
          }
        } catch (_) {}
      };

      ws.onerror = () => log('WS error');
      ws.onclose = () => {
        log('Disconnected');
        if (hbTimer) clearInterval(hbTimer);
      };
    };

    E('disconnectBtn').onclick = () => {
      if (ws) ws.close();
    };

    E('sendHelloBtn').onclick = () => send(helloPayload());
    E('sendHeartbeatBtn').onclick = () => send(heartbeatPayload());

    E('sendManualBtn').onclick = () => {
      try {
        const obj = JSON.parse(E('manualMsg').value);
        send(obj);
      } catch (e) {
        log('Invalid JSON: ' + e.message);
      }
    };

    E('pingOneBtn').onclick = async () => {
      const base = E('apiBaseUrl').value.trim();
      const readerId = encodeURIComponent(E('readerId').value.trim());
      let jwt = E('adminJwt').value.trim();
      const timeout = Number(E('pingTimeout').value || 3000);
      if (!jwt) {
        const apiKey = E('apiKey').value.trim();
        jwt = await buildReaderJWT(apiKey);
        log('Using reader JWT for individual ping');
      }
      try {
        const res = await fetch(`${base}/api/readers/${readerId}/ping?timeout_ms=${timeout}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${jwt}` }
        });
        const body = await res.text();
        log(`PING ONE (${res.status}) ${body}`);
      } catch (e) {
        log('Ping one request error: ' + e.message);
      }
    };

    E('pingAllBtn').onclick = async () => {
      const base = E('apiBaseUrl').value.trim();
      let jwt = E('adminJwt').value.trim();
      const timeout = Number(E('pingTimeout').value || 3000);
      if (!jwt) {
        const apiKey = E('apiKey').value.trim();
        jwt = await buildReaderJWT(apiKey);
        log('Using reader JWT for pingall');
      }
      try {
        const res = await fetch(`${base}/api/readers/pingall?timeout_ms=${timeout}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${jwt}`
          }
        });
        const body = await res.text();
        log(`PING ALL (${res.status}) ${body}`);
      } catch (e) {
        log('Ping all request error: ' + e.message);
      }
    };

    E('statusBtn').onclick = async () => {
      const base = E('apiBaseUrl').value.trim();
      const readerId = encodeURIComponent(E('readerId').value.trim());
      let jwt = E('adminJwt').value.trim();
      if (!jwt) {
        const apiKey = E('apiKey').value.trim();
        jwt = await buildReaderJWT(apiKey);
        log('Using reader JWT for status');
      }
      try {
        const res = await fetch(`${base}/api/readers/${readerId}/status`, {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${jwt}` }
        });
        const body = await res.text();
        log(`STATUS (${res.status}) ${body}`);
      } catch (e) {
        log('Status request error: ' + e.message);
      }
    };

    E('logsBtn').onclick = async () => {
      const base = E('apiBaseUrl').value.trim();
      const readerId = encodeURIComponent(E('readerId').value.trim());
      let jwt = E('adminJwt').value.trim();
      if (!jwt) {
        const apiKey = E('apiKey').value.trim();
        jwt = await buildReaderJWT(apiKey);
        log('Using reader JWT for logs');
      }
      try {
        const res = await fetch(`${base}/api/readers/${readerId}/logs?limit=100`, {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${jwt}` }
        });
        const body = await res.text();
        log(`LOGS (${res.status}) ${body}`);
      } catch (e) {
        log('Logs request error: ' + e.message);
      }
    };

    E('resolveWorklistBtn').onclick = async () => {
      const base = E('apiBaseUrl').value.trim();
      let jwt = E('adminJwt').value.trim();
      if (!jwt) {
        const apiKey = E('apiKey').value.trim();
        jwt = await buildReaderJWT(apiKey);
        log('Using reader JWT for worklist resolve');
      }
      const tags = E('requestedTags').value
        .split(',')
        .map(x => x.trim())
        .filter(Boolean);
      const payload = {
        reader_id: E('readerId').value.trim(),
        sample_id: E('sampleId').value.trim(),
        tags
      };
      try {
        const res = await fetch(`${base}/api/worklist/resolve`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${jwt}`
          },
          body: JSON.stringify(payload)
        });
        const body = await res.text();
        log(`WORKLIST (${res.status}) ${body}`);
      } catch (e) {
        log('Worklist request error: ' + e.message);
      }
    };

    function base64url(inputBytes) {
      let str = btoa(String.fromCharCode(...inputBytes));
      return str.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function hmacSha256(secret, data) {
      const enc = new TextEncoder();
      const key = await crypto.subtle.importKey(
        'raw',
        enc.encode(secret),
        { name: 'HMAC', hash: 'SHA-256' },
        false,
        ['sign']
      );
      const sig = await crypto.subtle.sign('HMAC', key, enc.encode(data));
      return new Uint8Array(sig);
    }

    async function buildReaderJWT(apiKey) {
      const header = { alg: 'HS256', typ: 'JWT' };
      const now = Math.floor(Date.now() / 1000);
      const payload = {
        sub: E('readerId').value,
        role: 'reader',
        analyzer_code: E('analyzerCode').value,
        iat: now,
        exp: now + 300,
        jti: 'html-' + now + '-' + Math.floor(Math.random() * 100000)
      };
      const enc = new TextEncoder();
      const h = base64url(enc.encode(JSON.stringify(header)));
      const p = base64url(enc.encode(JSON.stringify(payload)));
      const toSign = `${h}.${p}`;
      const sig = await hmacSha256(apiKey, toSign);
      return `${toSign}.${base64url(sig)}`;
    }
  </script>
</body>
</html>
