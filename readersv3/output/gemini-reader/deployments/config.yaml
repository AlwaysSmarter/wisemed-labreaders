reader:
  id: gemini-v3
  label: Gemini Reader V3
  analyzer_name: Gemini / IR Biotyper
  analyzer_code: gemini-v3

local_http:
  enabled: true
  address: 127.0.0.1:18080
  language: ro

analyzer:
  comm_type: tcpip
  protocol: astm

modules:
  qc:
    levels: ["negativ", "pozitiv", "pcrescut", "pscazut", "nivel1", "nivel2", "nivel3", "nivel4", "nivel5"]
  app-updates:
    enabled: true
    app_id: gemini-v3
    current_version: 1.0.0
    channel: stable
    base_url: http://127.0.0.1:19090
    auto_download: true
    download_dir: ./updates
  local-http:
    address: 127.0.0.1:18080
    language: ro
  storage-sqlite:
    path: ./gemini-reader-v3.db
  wisemed-api:
    base_url: https://api.wisemed.example
  help:
    help_dir: ./help
  transport-tcpip:
    host: 127.0.0.1
    port: 9000
