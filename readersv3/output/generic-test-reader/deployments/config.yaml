reader:
  id: generic-test-v3
  label: Generic Test Reader V3
  analyzer_name: Generic Analyzer
  analyzer_code: generic-test-v3

local_http:
  enabled: true
  address: 127.0.0.1:18080
  language: ro

wisemed_ws:
  enabled: true
  url: wss://wslocal.wisemed.eu/ws

analyzer:
  comm_type: file
  protocol: generic-file

modules:
  qc:
    levels: ["negativ", "pozitiv", "pcrescut", "pscazut", "nivel1", "nivel2", "nivel3", "nivel4", "nivel5"]
  app-updates:
    enabled: true
    app_id: generic-test-v3
    current_version: 1.0.0
    channel: stable
    base_url: http://127.0.0.1:19090
    auto_download: true
    download_dir: ./updates
  local-http:
    address: 127.0.0.1:18080
    language: ro
  storage-sqlite:
    path: ./generic-test-reader-v3.db
  wisemed-api:
    base_url: https://api.wisemed.example
  help:
    help_dir: ./help
  transport-file:
    import_dir: ./inbox
    pattern: "*.txt"
