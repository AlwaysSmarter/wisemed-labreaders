reader:
  id: cary60-uvvis-v3
  label: Cary60 UV-VIS
  analyzer_name: Cary60 UV-VIS
  analyzer_code: cary60-uvvis
  db_name: cary60-uvvis-reader-v3.db
local_http:
  enabled: true
  address: 127.0.0.1:18080
  language: ro
  tls: false
wisemed_ws:
  enabled: false
  url: wss://wslocal.wisemed.eu/ws
  heartbeat_ms: 15000
  reconnect_delay_ms: 5000
analyzer:
  comm_type: file
  protocol: cary60-uvvis
modules:
  app-updates:
    enabled: true
    app_id: cary60-uvvis-v3
    channel: stable
    base_url: http://127.0.0.1:19090
    auto_download: true
    download_dir: ./updates
  daily-details:
    allow_dynamic_definitions: true
    definitions de:
      - active: true
        field_type: number
        key: amartor
        label: A martor
        placeholder: Absorbanta martor
        scope: day_analyte
        sort_order: 1
      - active: true
        field_type: number
        key: zero_report
        label: Zero Report
        placeholder: Citire Zero
        scope: day_analyte
        sort_order: 2
      - active: true
        field_type: text
        key: concentration_units
        label: Concentration Units
        placeholder: UM din import
        scope: day_analyte
        sort_order: 3
  qc:
    levels: ["negativ", "pozitiv", "pcrescut", "pscazut", "nivel1", "nivel2", "nivel3", "nivel4", "nivel5"]
  result-sync:
    enabled: true
    interval_minutes: 5
    sample_prefixes: []
    sample_suffixes: []
    separators: ["-"]
    qc_prefixes: []
  local-http:
    enabled: true
    address: 127.0.0.1:18080
    language: ro
    repeat_mode: individual
    tls: false
  protocol-cary60-uvvis:
    poll_seconds: 2
  storage-sqlite:
    path: ./cary60-uvvis-reader-v3.db
  wisemed-api:
    base_url: https://api.wisemed.example
    cfg_wisemed_protocol: https
    cfg_wisemed_ip: ldse.wisemed.eu
    cfg_wisemed_port: "443"
    cfg_wisemed_path: /wisemed-api/apiv2
    cfg_wisemed_key: 27c490bb-c9e4-47aa-bf6d-ebd2a1add35e
  help:
    help_dir: ./help
  transport-file:
    import_dir: ./inbox
    processed_dir: ./processed
    failed_dir: ./failed
    export_dir: ./outbox
    pattern: "*.csv"
