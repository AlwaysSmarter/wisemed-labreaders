reader:
  id: gemini-v3
  label: Gemini Reader V3
  analyzer_name: Gemini / IR Biotyper
  analyzer_code: gemini-v3
  db_name: gemini-reader-v3.db
local_http:
  enabled: true
  address: 127.0.0.1:18080
  language: ro
  tls: false
wisemed_ws:
  enabled: true
  url: wss://wslocal.wisemed.eu/ws
  heartbeat_ms: 15000
  reconnect_delay_ms: 5000
analyzer:
  comm_type: tcpip
  protocol: astm
modules:
  app-updates:
    enabled: true
    app_id: gemini-v3
    channel: stable
    base_url: http://127.0.0.1:19090
    auto_download: true
    download_dir: ./updates
  qc:
    levels: ["negativ", "pozitiv", "pcrescut", "pscazut", "nivel1", "nivel2", "nivel3", "nivel4", "nivel5"]
  result-sync:
    enabled: true
    interval_minutes: 5
    sample_prefixes: []
    sample_suffixes: []
    separators: ["-"]
    qc_prefixes: []
  local-http:
    enabled: true
    address: 127.0.0.1:18080
    language: ro
    repeat_mode: individual
    tls: false
  storage-sqlite:
    path: ./gemini-reader-v3.db
  wisemed-api:
    base_url: https://api.wisemed.example
    cfg_wisemed_protocol: https
    cfg_wisemed_ip: ldse.wisemed.eu
    cfg_wisemed_port: "443"
    cfg_wisemed_path: /wisemed-api/apiv2
    cfg_wisemed_key: 27c490bb-c9e4-47aa-bf6d-ebd2a1add35e
  help:
    help_dir: ./help
  transport-tcpip:
    host: 127.0.0.1
    port: 9000
