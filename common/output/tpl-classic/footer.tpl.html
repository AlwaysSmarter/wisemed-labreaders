<script>
    $( document ).ready(function() {
        checkErrorVisibility();
    });
    function checkErrorVisibility() {
        if ($('#error-text .error-text').html() != "") {
            $('#error-text').removeClass('hide');
        }
        else {
            $('#error-text').addClass('hide');
        }
    }
    function setApplicationError(txt) {
        $('#error-text .error-text').html(txt);
        checkErrorVisibility();
    }
    function populateSelectFromJson(selectId, jsonStr, optionKey, optionVal) {
        console.log('populateSelectFromJson');
        obj = {}
        try {
            obj = jQuery.parseJSON( jsonStr );
        }
        catch (e) {
            //nothing here
        }

        $.each(obj, function( key, value ) {
            console.log(value);

            $(selectId).append($('<option>', {
                value: value[optionKey],
                text: value[optionVal]
            }));

        });
    }
</script>
</body>
</html>
